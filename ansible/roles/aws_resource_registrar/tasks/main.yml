---
- name: Gather S3 Bucket Information
  amazon.aws.s3_bucket_info:
    # Ensure this is exactly amazon.aws
    region: "{{ aws_region }}"
  register: s3_info

- name: Gather SQS Queue Information
  amazon.aws.sqs_info:
    # Ensure this is exactly amazon.aws
    region: "{{ aws_region }}"
  register: sqs_info

- name: Generate File SD JSON for Custom Exporters
  template:
    src: aws_resources.json.j2
    dest: /etc/prometheus/file_sd/aws_resources.json
    owner: prometheus
    group: prometheus
    mode: "0644"
