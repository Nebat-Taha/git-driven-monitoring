---
- name: Gather S3 Bucket Information
  amazon.aws.s3_bucket_info:
    region: "{{ aws_region | default('us-east-1') }}"
  register: all_buckets

- name: Filter Buckets by Project Tag Defensively
  set_fact:
    filtered_buckets: >-
      {{ 
        all_buckets.buckets 
        | selectattr('tags', 'defined') 
        | selectattr('tags', 'ne', none)
        | selectattr('tags.project', 'defined') 
        | selectattr('tags.project', 'equalto', 'monitoring-system') 
        | list 
      }}

- name: Debug Filtered Buckets
  debug:
    var: filtered_buckets

- name: SHOW ME THE BUCKETS
  debug:
    msg: "Ansible found these matching buckets: {{ filtered_buckets |
      map(attribute='name') | list }}"

- name: Generate File SD JSON for Custom Exporters
  template:
    src: aws_resources.json.j2
    dest: /etc/prometheus/file_sd/aws_resources.json
    owner: prometheus
    group: prometheus
    mode: "0644"
