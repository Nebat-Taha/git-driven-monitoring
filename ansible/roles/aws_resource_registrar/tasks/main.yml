---
- name: Gather S3
  amazon.aws.s3_bucket_facts:
    region: us-east-1
  register: s3_info

- name: Gather SQS
  amazon.aws.sqs_facts:
    region: us-east-1
  register: sqs_info
- name: Generate File SD JSON for Custom Exporters
  template:
    src: aws_resources.json.j2
    dest: /etc/prometheus/file_sd/aws_resources.json
    owner: prometheus
    group: prometheus
    mode: "0644"
