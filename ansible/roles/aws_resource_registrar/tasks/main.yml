---
- name: Local Discovery of S3 Buckets
  delegate_to: localhost
  become: false
  shell: |
    # Get all bucket names
    BUCKETS=$(aws s3api list-buckets --query 'Buckets[].Name' --output text)

    MATCHES=""
    for bucket in $BUCKETS; do
      # Check for the specific project tag
      TAG=$(aws s3api get-bucket-tagging --bucket "$bucket" --query 'TagSet[?Key==`project` && Value==`monitoring-system`].Value' --output text 2>/dev/null)
      
      if [ "$TAG" == "monitoring-system" ]; then
        if [ -z "$MATCHES" ]; then MATCHES="\"$bucket\""; else MATCHES="$MATCHES, \"$bucket\""; fi
      fi
    done
    echo "[$MATCHES]"
  register: local_filtered_buckets

- name: Create local temp file for discovery
  delegate_to: localhost
  become: false
  copy:
    content: |
      [
        {
          "targets": {{ local_filtered_buckets.stdout }},
          "labels": {
            "job": "custom_s3_exporter"
          }
        }
      ]
    dest: "/tmp/aws_resources.json"

- name: Ship the discovery file to the server
  copy:
    src: "/tmp/aws_resources.json"
    dest: "/etc/prometheus/file_sd/aws_resources.json"
    owner: prometheus
    group: prometheus
    mode: "0644"

- name: Force Prometheus to refresh targets
  systemd:
    name: prometheus
    state: restarted
