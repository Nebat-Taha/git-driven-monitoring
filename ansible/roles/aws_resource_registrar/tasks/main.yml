---
- name: Gather S3 Bucket Information
  amazon.aws.s3_bucket_info:
    region: "{{ aws_region | default('us-east-1') }}"
  register: all_buckets

- name: Fetch Tags for Each Bucket
  amazon.aws.s3_bucket_tagging_info:
    bucket: "{{ item.name }}"
    region: "{{ aws_region | default('us-east-1') }}"
  loop: "{{ all_buckets.buckets }}"
  register: bucket_tags
  ignore_errors: true # Some buckets might be in different regions

- name: Consolidate and Filter Buckets with Tags
  set_fact:
    filtered_buckets: >-
      {% set results = [] %} {% for b in bucket_tags.results %}
        {% if b.tags is defined and b.tags and b.tags.project == 'monitoring-system' %}
          {% set _ = results.append({'name': b.item.name, 'tags': b.tags}) %}
        {% endif %}
      {% endfor %} {{ results }}

- name: DEBUG - SHOW ME THE MATCHING BUCKETS
  debug:
    msg: "Final list for Prometheus: {{ filtered_buckets | map(attribute='name') |
      list }}"

- name: Generate File SD JSON for Custom Exporters
  template:
    src: aws_resources.json.j2
    dest: /etc/prometheus/file_sd/aws_resources.json
    owner: prometheus
    group: prometheus
    mode: "0644"

- name: Force Prometheus to refresh targets
  systemd:
    name: prometheus
    state: restarted
