---
- name: Discover Tagged S3 Buckets (The Registrar)
  delegate_to: localhost
  become: false
  shell: |
    aws s3api list-buckets --query 'Buckets[].Name' --output text | xargs -n1 | xargs -I {} sh -c 'aws s3api get-bucket-tagging --bucket {} --query "TagSet[?Key==`project` && Value==`monitoring-system`].Value" --output text 2>/dev/null && echo {}'
  register: bucket_discovery

- name: Update Monitored Buckets Registry
  copy:
    content: "{{ bucket_discovery.stdout }}"
    dest: "/etc/prometheus/monitored_buckets.list"
    owner: prometheus
    group: prometheus
    mode: "0644"

- name: Register Exporter Target in Self-Service Layer
  copy:
    content: |
      [
        {
          "targets": ["localhost:9201"],
          "labels": {
            "exporter_type": "s3_manager",
            "project": "monitoring-system"
          }
        }
      ]
    dest: "/etc/prometheus/file_sd/aws_resources.json"
    owner: prometheus
    group: prometheus
    mode: "0644"

- name: Reload Prometheus
  systemd:
    name: prometheus
    state: restarted
