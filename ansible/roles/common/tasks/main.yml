# ===============================================================================================
# Architecture: Base Environment Setup
# Trigger: Executed as the first role in site.yml for all hosts.
# Decisions: * Uses a System User (prometheus) without a home directory or shell access to
# minimize the attack surface.

# Standardizes the /opt/monitoring path to avoid "Configuration Drift" where files are scattered
# across /home/ubuntu or /tmp.

# Prepares File Service Discovery (file_sd) paths so Prometheus can dynamically find targets
# without a reload.
#================================================================================================

---
# ==============================================================================
# TASK: Repository & Package Management
# DECISION:We set cache_valid_time to 86400 (24 hours). This ensures the
#           system index is relatively fresh without wasting time on
#           every single playbook run.
# TODO: follow up
# ==============================================================================
- name: Update apt cache (Once)
  apt:
    update_cache: yes
    cache_valid_time: 86400 # Only runs 'apt update' once per day

- name: Ensure prometheus group exists
  group:
    name: prometheus
    state: present
    system: yes

- name: Create prometheus system user
  user:
    name: prometheus
    group: prometheus
    shell: /sbin/nologin
    system: yes
    create_home: no

# ==============================================================================
# TASK: Directory Structure Orchestration
# DECISION: Use a loop to keep the code DRY (Don't Repeat Yourself).
# ==============================================================================
- name: Create base monitoring directories
  file:
    path: "{{ item }}" # This variable pulls the current string from the 'loop' list below
    state: directory
    owner: prometheus
    group: prometheus
    mode: "0755"
  loop:
    - /opt/monitoring
    - /opt/monitoring/scripts
    - /opt/monitoring/venv
    - /etc/prometheus
    - /etc/prometheus/file_sd
    - /var/lib/prometheus

- name: Ensure universe repository is enabled
  apt_repository:
    repo: "deb http://archive.ubuntu.com/ubuntu {{ ansible_distribution_release }} universe"
    state: present

- name: Install base dependencies
  apt:
    name:
      - python3-pip
      - python3-venv
      - python3-setuptools
      - unzip
      - curl
      - git
    state: present
    update_cache: yes
    cache_valid_time: 3600
