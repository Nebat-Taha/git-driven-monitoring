---
# PHASE 1: Install & Setup
- name: Create prometheus group
  group:
    name: prometheus
    state: present
    system: yes

- name: Create prometheus user
  user:
    name: prometheus
    group: prometheus
    shell: /sbin/nologin
    system: yes
    create_home: no

- name: Download and Unarchive Node Exporter
  unarchive:
    src: "https://github.com/prometheus/node_exporter/releases/download/v1.7.0/node_exporter-1.7.0.linux-amd64.tar.gz"
    dest: /tmp
    remote_src: yes
    creates: "/tmp/node_exporter-1.7.0.linux-amd64/node_exporter"

- name: Copy binary to /usr/local/bin
  copy:
    src: "/tmp/node_exporter-1.7.0.linux-amd64/node_exporter"
    dest: /usr/local/bin/node_exporter
    mode: "0755"
    owner: prometheus
    group: prometheus
    remote_src: yes

# PHASE 2: Configuration & Service
- name: Install systemd service file
  template:
    src: node_exporter.service.j2
    dest: /etc/systemd/system/node_exporter.service
  register: service_file

- name: Force systemd reload and start service
  systemd:
    name: node_exporter
    state: started
    enabled: yes
    daemon_reload: yes

- name: Restart node_exporter if service file changed
  systemd:
    name: node_exporter
    state: restarted
  when: service_file.changed
