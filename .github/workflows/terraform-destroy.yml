# ==============================================================================
# WORKFLOW: Infrastructure Deconstruction (Terraform Destroy)
# ==============================================================================
# ARCHITECTURE:
#   - Single-job workflow to tear down all AWS resources managed by Terraform.
#
# TRIGGER:
#   - 'workflow_dispatch' (Manual only). This should NEVER be automated on push.
#
# SECURITY STRATEGY:
#   - OIDC: Assumes the same 'AWS_ROLE_ARN' used for deployment.
#   - GATING: Locked behind the 'production-delete' environment. This requires
#     a second human approval in GitHub to prevent accidental deletion.
#
# DECISIONS:
#   - CLEANUP: Ensures all EIPs, Security Groups, and Instances are removed
#     to avoid "Ghost Billing" in the AWS account.
# ==============================================================================
name: Infrastructure Teardown

on:
  workflow_dispatch: # Manual trigger only

permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: us-east-1

jobs:
  terraform_destroy:
    name: "Destroy Infrastructure"
    runs-on: ubuntu-latest
    #environment: test # Optional: Add a second approval gate here too!

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Terraform Init
        run: terraform init -reconfigure
        working-directory: ./terraform

      - name: Terraform Destroy
        # -auto-approve is used because the "Approval" happened at the Environment gate
        run: terraform destroy -auto-approve -var="my_ip=0.0.0.0/0"
        working-directory: ./terraform
