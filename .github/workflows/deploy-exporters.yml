# Architecture: Automated CI/CD Pipeline
# Decisions:
#
# Linting (PR Gate): Checks for syntax errors (E9, F63, etc.) so a missing colon or an undefined variable doesn't crash your systemd services.
#
# OIDC Authentication: Uses role-to-assume with AWS, which is the most secure way to handle credentials—no long-lived AWS keys are stored in GitHub.
#
# OIDC: Assumes the AWS role without long-lived keys.
#
# EIC: Pushes a temporary public key to the server; the private key stays in the GitHub runner's RAM
# and is destroyed when the job ends.
#
# Targeting: Uses the Project: monitoring-system tag to ensure keys are only pushed to relevant nodes.
#
# Granular Scoping: Only runs if files inside python_scripts/ or exporters_configs/ are modified. This saves GitHub Action minutes and prevents unnecessary Ansible runs.
#
# ===========================================
name: "Workflow 4: Deploy Custom Exporters"

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - "python_scripts/**"
      - "exporters_configs/**"
  pull_request:
    paths:
      - "python_scripts/**"

jobs:
  # --- STAGE 1: Code Quality Check ---
  lint:
    name: "Python Linting (Flake8)"
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install Linter
        run: pip install flake8

      - name: Run Linter
        # This checks the python_scripts folder for syntax and style errors
        run: flake8 python_scripts/ --count --select=E9,F63,F7,F82 --show-source --statistics

  # --- STAGE 2: Deployment (Only runs if Lint passes) ---
  # --- STAGE 2: Deployment (Secure & Keyless) ---
  deploy:
    name: "Deploy to EC2"
    needs: lint
    if: (github.event_name == 'push' || github.event_name == 'workflow_dispatch') && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      id-token: write # Necessary for OIDC JWT
      contents: read # Necessary for actions/checkout
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: us-east-1

      - name: Generate Ephemeral SSH Key
        run: |
          mkdir -p ~/.ssh
          ssh-keygen -t rsa -f ~/.ssh/id_rsa -N "" -q
          chmod 600 ~/.ssh/id_rsa

      - name: Inject SSH Keys (Instance Connect)
        run: |
          # Finds all monitoring nodes to authorize the ephemeral key
          INSTANCE_IDS=$(aws ec2 describe-instances \
            --filters "Name=tag:Project,Values=monitoring-system" "Name=instance-state-name,Values=running" \
            --query "Reservations[*].Instances[*].InstanceId" \
            --output text)

          for ID in $INSTANCE_IDS; do
            aws ec2-instance-connect send-ssh-public-key \
              --instance-id $ID \
              --instance-os-user ubuntu \
              --ssh-public-key file://~/.ssh/id_rsa.pub
          done

      - name: Install Ansible Dependencies
        run: |
          python3 -m pip install boto3 botocore
          # This ensures the 'aws_ec2' plugin can find the libs
          ansible-galaxy collection install amazon.aws

      - name: Run Ansible Deploy Playbook
        env:
          ANSIBLE_CONFIG: ${{ github.workspace }}/ansible/ansible.cfg
          ANSIBLE_HOST_KEY_CHECKING: "False"
        run: |
          ansible-playbook -i ansible/inventory/aws_ec2.yml  ansible/playbooks/deploy_scripts.yml
