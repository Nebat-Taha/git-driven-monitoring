name: "Workflow 4: Deploy Custom Exporters"

on:
  push:
    branches:
      - main
    paths:
      - "python_scripts/**"
      - "exporters_configs/**"
  pull_request:
    paths:
      - "python_scripts/**"

jobs:
  # --- STAGE 1: Code Quality Check ---
  lint:
    name: "Python Linting (Flake8)"
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install Linter
        run: pip install flake8

      - name: Run Linter
        # This checks the python_scripts folder for syntax and style errors
        run: flake8 python_scripts/ --count --select=E9,F63,F7,F82 --show-source --statistics

  # --- STAGE 2: Deployment (Only runs if Lint passes) ---
  # --- STAGE 2: Deployment (Secure & Keyless) ---
  deploy:
    name: "Deploy to EC2"
    needs: lint
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      id-token: write # Necessary for OIDC JWT
      contents: read # Necessary for actions/checkout
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION}}

      - name: Setup SSH Key
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}

      - name: Install Ansible Dependencies
        run: pip install boto3 botocore

      - name: Run Ansible Deploy Playbook
        run: |
          cd ansible
          ansible-playbook -i inventory/ playbooks/deploy_scripts.yml
