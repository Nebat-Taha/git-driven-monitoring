# ==============================================================================
# WORKFLOW 1: Infrastructure Deployment (Terraform)
# ==============================================================================
# ARCHITECTURE:
#   - Two-stage pipeline: 'Plan' and 'Apply'.
#   - Execution occurs on GitHub-hosted Ubuntu runners.
#
# TRIGGER:
#   - Currently 'workflow_dispatch' for manual control.
#   - Configured (commented) for automatic pushes to 'main' affecting terraform/ code.
#
# SECURITY STRATEGY:
#   - OIDC (OpenID Connect): Uses 'id-token: write' to assume an AWS IAM Role
#     via 'secrets.AWS_ROLE_ARN'. No long-lived AWS Access Keys are used.
#   - LEAST PRIVILEGE: 'TF_VAR_my_ip' is pulled from GitHub Secrets to restrict
#     SSH/Management traffic to the admin's specific IP without exposing it in logs.
#
# DEPLOYMENT DECISIONS:
#   - DETERMINISTIC EXECUTION: I use GitHub Action Artifacts to pass the binary
#     'tfplan' file from the Plan job to the Apply job. This ensures the execution
#     is exactly what was inspected, preventing drift if code changes during approval.
#   - ENVIRONMENT GATING: The 'Apply' job is locked behind the 'test' environment
#     to allow for manual verification of the plan before infrastructure is changed.
# ==============================================================================

name: Terraform Deployment

on:
  workflow_dispatch:
  # push:
  #   branches: [ main ]
  #   paths:
  #  - 'terraform/*.tf'         # Changes to main.tf, providers, etc.
  #  - 'terraform/modules/**'   # Changes to any reusable module

permissions: # TODO: refer priviledges
  contents: read
  id-token: write

env:
  AWS_REGION: us-east-1
  TF_VAR_my_ip: ${{ secrets.TF_VAR_my_ip }} # This maps the secret to Terraform

jobs:
  # --- JOB 1: PLAN ---
  terraform_plan:
    name: "Terraform Plan"
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.12.1

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v3
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Terraform Init
        run: terraform init -reconfigure
        working-directory: ./terraform

      - name: Terraform Plan
        # We output to a file 'tfplan' to ensure the 'Apply' stage uses this exact result
        run: terraform plan -input=false -out=tfplan
        working-directory: ./terraform

      - name: Upload Plan Artifact
        uses: actions/upload-artifact@v4
        with:
          name: tfplan
          path: terraform/tfplan

  # --- JOB 2: APPLY ---
  terraform_apply:
    name: "Terraform Apply"
    needs: terraform_plan
    runs-on: ubuntu-latest
    environment: test # Requires manual approval in GitHub Settings, change to test
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.12.1

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v3
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Download Plan Artifact
        uses: actions/download-artifact@v4
        with:
          name: tfplan
          path: terraform/

      - name: Terraform Init
        run: terraform init -reconfigure
        working-directory: ./terraform

      - name: Terraform Apply # TODO : versioning of artifact and how it works
        # Apply specifically the binary 'tfplan' artifact downloaded above
        run: terraform apply -auto-approve tfplan
        working-directory: ./terraform
